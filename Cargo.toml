# Exclude the cargo-fuzz workspace at `fuzz/` from the implicit single-crate
# workspace this package forms. The fuzz crate uses `libfuzzer-sys` (nightly +
# libFuzzer) and is built separately via `cargo +nightly fuzz run <target>`.
[workspace]
exclude = ["fuzz"]

[package]
name = "puremp"
version = "0.2.4"
edition = "2024"
rust-version = "1.88"
description = "A pure-Rust arbitrary-precision arithmetic library ‚Äî integers, rationals and MPFR-class floats ‚Äî with a dependency-free clean-room core (optional serde/rand bridges), plus a C ABI and a CLI."
repository = "https://github.com/KarpelesLab/puremp"
license = "MIT"
keywords = ["bignum", "bigint", "arbitrary-precision", "rational", "no-std"]
categories = ["mathematics", "no-std", "algorithms"]

[lib]
name = "puremp"

[features]
# `std` is the convenient default; it implies `alloc`. Disable default features
# for a bare `no_std` build (`--no-default-features`), optionally re-enabling
# `alloc` (or a specific type layer) for heap-backed arbitrary-precision types.
#
# The type layers stack bottom-up: `int` (naturals + signed integers) is the
# foundation and `rational` builds on it ‚Äî together they are the core contract.
# `float` is a separable layer (not part of the core contract) but is enabled
# by default for convenience; disable it with `--no-default-features`
# (optionally re-enabling `rational`/`cli`).
default = ["std", "rational", "float", "dyadic", "padic", "decimal", "complex", "poly", "interval", "ball", "matrix", "lattice", "identify", "algebraic", "primality", "galois", "elliptic", "numberfield", "cli"]
std = ["alloc"]
alloc = []

# --- type layers ---
# Arbitrary-precision naturals (`Nat`) and signed integers (`Int`). Requires a
# heap allocator (`alloc`).
int = ["alloc"]
# Arbitrary-precision rationals (`Rational`) built on `Int`. Also enables the
# `InfRational` extended-rational type (¬±‚àû / NaN).
rational = ["int"]
# Exact dyadic rationals (`Dyadic`, i.e. `n¬∑2^-k`) built on `Int`.
dyadic = ["int"]
# Fixed-precision p-adic numbers (`Padic`, elements of ‚Ñö_p) built on `Rational`.
padic = ["rational"]
# Arbitrary-precision base-10 floating point (`Decimal`) built on `Int`.
decimal = ["int"]
# Generic complex numbers (`Complex<T>`), e.g. Gaussian integers `Complex<Int>`.
complex = ["int"]
# Finite (Galois) field extensions `GF(p·µè)` (`GaloisField`/`GfElement`) built on
# `Int`, with Rabin irreducibility testing. Extends `ModInt`'s `GF(p)`.
galois = ["int"]
# Generic polynomials (`Poly<T>`) over any ring/field component type.
poly = ["alloc"]
# Generic dense matrices (`Matrix<T>`); exact determinant for Int/Rational.
matrix = ["alloc"]
# LLL lattice basis reduction over integer lattices (exact rational Gram-Schmidt).
lattice = ["rational"]
# Experimental-math tools: inverse symbolic calculator (`identify`) and
# Machin-like formula discovery (`machin_like`), built on PSLQ + `Float`.
identify = ["lattice", "float"]
# Discrete logarithms modulo n (baby-step giant-step + Pollard's rho). Built on
# `Int`/`ModInt`.
dlog = ["int"]
# Certificate-based primality *proving*: Pocklington‚ÄìLehmer and the BLS n^{1/3}
# `n‚àì1` refinement, plus Atkin‚ÄìMorain **ECPP** (elliptic-curve primality proving)
# for inputs where `n‚àì1` cannot be factored, producing an auditable
# `PrimalityCertificate`. ECPP needs modular polynomial root-finding (`poly`).
primality = ["int", "poly"]
# Optional arbitrary-precision binary floats (`Float`) with directed rounding,
# aiming at MPFR-class correct rounding. Built on `Int`/`Rational` (decimal I/O
# reuses exact rationals), but NOT part of the integer/rational core contract.
float = ["int", "rational"]
# Interval arithmetic (`Interval`) with outward-rounded `Float` endpoints.
interval = ["float"]
# Ball (midpoint-radius) rigorous arithmetic (`Ball`), Arb-style. Built on `Interval`.
ball = ["interval"]
# Algebraic numbers: exact ‚Ñö(‚àöd) (`Quadratic`) and general real `Algebraic`.
algebraic = ["rational", "poly", "matrix", "float"]
# Algebraic number fields `K = ‚Ñö(Œ∏) = ‚Ñö[x]/(T(x))` (`NumberField`/
# `NumberFieldElement`): element arithmetic, norm/trace/char-poly/min-poly,
# discriminant, signature and complex embeddings. Built on `Poly<Rational>`,
# `Matrix<Rational>` and `Complex<Float>`.
numberfield = ["rational", "poly", "matrix", "complex", "float"]
# Elliptic curves `y¬≤ = x¬≥ + a¬∑x + b` over `GF(p)` (`ModInt`) or `‚Ñö` (`Rational`),
# with the chord-and-tangent group law, point orders and point counting (naive
# scan plus Schoof's polynomial-time algorithm, which needs `poly`).
elliptic = ["rational", "poly"]

# C ABI: builds the `ffi` module (the only place `unsafe` is allowed). Build a
# C library with `cargo rustc --lib --features ffi --crate-type staticlib`
# (or `--crate-type cdylib`). The generated symbols are declared in
# `include/puremp.h`.
ffi = ["std", "rational", "float"]

# The `puremp` command-line calculator/REPL (gates the binary target below).
cli = ["std", "rational"]

# Optional ecosystem glue: a blanket `RandomSource` impl for `rand_core::RngCore`
# so `rand` generators can drive `Nat`/`Int` random generation. The in-house
# `RandomSource` trait itself needs no dependency; this only adds the bridge.
rand = ["dep:rand_core", "int"]

# Optional serde support: hand-written (no `serde_derive`) Serialize/Deserialize
# for the number types, round-tripping via their exact string forms.
serde = ["dep:serde", "int"]

# Optional `num-traits` bridge: implements Zero/One/Num/Signed/ToPrimitive/
# FromPrimitive for `Int`/`Rational`, and Zero/One for `Nat`/`Decimal`/`Complex`,
# so the types slot into generic numeric code (impls activate for whichever type
# features are also enabled).
num-traits = ["dep:num-traits", "int", "rational"]

# The arithmetic core is a clean-room, dependency-free implementation (see the
# README's "Design & provenance"); the only dependencies are optional, opt-in
# ecosystem bridges that the default build never pulls in.
[dependencies]
rand_core = { version = "0.6", optional = true, default-features = false }
serde = { version = "1", optional = true, default-features = false, features = ["alloc"] }
num-traits = { version = "0.2", optional = true, default-features = false }

# Test-only: exercise the `serde` impls through a real format. Not shipped to
# consumers, and only used by the `serde`-gated tests.
[dev-dependencies]
serde_json = "1"

[[bin]]
name = "puremp"
path = "src/bin/puremp/main.rs"
required-features = ["cli"]

# Ad-hoc throughput harness (`cargo run --release --example bench`). Gated so
# `--no-default-features` (bare no_std) builds don't try to compile it.
[[example]]
name = "strassen_bench"
required-features=["std","matrix","rational"]

[[example]]
name = "poly_bench"
required-features=["std","poly","galois"]

[[example]]
name = "galois_bench"
required-features=["std","poly","galois"]

[[example]]
name = "rational_xreduce_bench"
required-features=["std","rational"]

[[example]]
name = "rational_e2e_bench"
required-features=["std","rational","matrix"]

[[example]]
name = "trig_bench"
required-features=["std","float"]

[[example]]
name = "factorial_bench"
required-features=["std","int"]

[[example]]
name = "bench"
required-features = ["std", "float"]

[[example]]
name = "alg_bench"
required-features = ["std", "algebraic"]

[lints.rust]
# Keep the public surface documented and the internal/external boundary honest.
missing_docs = "warn"
unreachable_pub = "warn"
# Deny (not forbid) so the `ffi` module can opt back in locally with a scoped
# `#[allow(unsafe_code)]`; the entire arithmetic core stays safe.
unsafe_code = "deny"

[profile.release]
# The small limb primitives benefit from aggressive cross-function inlining.
lto = "thin"
